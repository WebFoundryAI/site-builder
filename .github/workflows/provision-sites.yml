name: Provision R2R Sites

on:
  workflow_dispatch:
    inputs:
      csv_content:
        description: 'CSV content (domain,city,service_type,business_name,phone,cf_project,repo_name,areas_radius_miles)'
        required: true
        type: string

jobs:
  parse-and-validate:
    runs-on: ubuntu-latest
    outputs:
      sites: ${{ steps.parse.outputs.sites }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Parse CSV input
        id: parse
        run: |
          python scripts/parse_csv.py << 'EOF'
          ${{ inputs.csv_content }}
          EOF

      - name: Validate replacements
        run: |
          python scripts/validate_replacements.py << 'EOF'
          ${{ steps.parse.outputs.sites }}
          EOF

  provision:
    needs: parse-and-validate
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 2
      matrix:
        site: ${{ fromJson(needs.parse-and-validate.outputs.sites) }}

    steps:
      - uses: actions/checkout@v4
        with:
          repository: WebFoundryAI/manchester_blocked_drain_co_uk
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Generate service areas
        run: |
          python ${{ github.workspace }}/scripts/generate_service_areas.py \
            --city "${{ matrix.site.city }}" \
            --radius ${{ matrix.site.areas_radius_miles }} \
            --output service_areas.json

      - name: Customize site
        run: |
          python ${{ github.workspace }}/scripts/customise_site.py \
            --domain "${{ matrix.site.domain }}" \
            --city "${{ matrix.site.city }}" \
            --business-name "${{ matrix.site.business_name }}" \
            --phone "${{ matrix.site.phone }}" \
            --service-areas service_areas.json \
            --service-type "${{ matrix.site.service_type }}"

      - name: Setup Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          bash ${{ github.workspace }}/scripts/setup_cloudflare_pages.sh \
            "${{ matrix.site.cf_project }}" \
            "${{ matrix.site.domain }}"

      - name: Setup D1 Database
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          python ${{ github.workspace }}/scripts/setup_d1.py \
            --project "${{ matrix.site.cf_project }}"

      - name: Commit and push to new repo
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -A
          git commit -m "chore: customize site for ${{ matrix.site.domain }}"
          gh repo create WebFoundryAI/${{ matrix.site.repo_name }} --public --source=. --remote=origin --push

      - name: Set GitHub secrets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          bash ${{ github.workspace }}/scripts/set_github_secrets.sh \
            "${{ matrix.site.repo_name }}" \
            "${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}"

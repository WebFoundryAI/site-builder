name: Provision R2R Sites

on:
  workflow_dispatch:
    inputs:
      csv_content:
        description: 'CSV content (paste here OR commit to sites/provision.csv and leave blank)'
        required: false
        type: string
      max_parallel:
        description: 'Max parallel jobs (default: 2, max: 20)'
        required: false
        default: '2'
        type: string

permissions:
  contents: write
  packages: write
  repository-projects: write

jobs:
  parse-and-validate:
    runs-on: ubuntu-latest
    outputs:
      sites: ${{ steps.parse.outputs.sites || steps.parse-manual.outputs.sites }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Check for CSV file
        id: csv-check
        run: |
          if [ -f "sites/provision.csv" ]; then
            echo "use_file=true" >> $GITHUB_OUTPUT
            echo "CSV file found: sites/provision.csv"
          else
            echo "use_file=false" >> $GITHUB_OUTPUT
            if [ -z "${{ inputs.csv_content }}" ]; then
              echo "ERROR: No CSV provided. Either commit sites/provision.csv or paste CSV content" >&2
              exit 1
            fi
          fi

      - name: Parse CSV from file
        id: parse
        if: ${{ steps.csv-check.outputs.use_file == 'true' }}
        run: python scripts/parse_csv.py < sites/provision.csv

      - name: Parse CSV from input
        id: parse-manual
        if: ${{ steps.csv-check.outputs.use_file != 'true' }}
        run: |
          python scripts/parse_csv.py << 'CSVEOF'
          ${{ inputs.csv_content }}
          CSVEOF

      - name: Validate replacements
        run: |
          python scripts/validate_replacements.py << 'VALEOF'
          ${{ steps.parse.outputs.sites || steps.parse-manual.outputs.sites }}
          VALEOF

  provision:
    needs: parse-and-validate
    runs-on: ubuntu-latest
    strategy:
      max-parallel: ${{ fromJson(inputs.max_parallel || '2') }}
      matrix:
        site: ${{ fromJson(needs.parse-and-validate.outputs.sites) }}

    steps:
      - uses: actions/checkout@v4

      - name: Clone manchester template to subdirectory
        run: |
          git clone https://github.com/WebFoundryAI/manchester_blocked_drain_co_uk template
          cd template
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Generate service areas
        run: |
          python ${{ github.workspace }}/scripts/generate_service_areas.py \
            --city "${{ matrix.site.city }}" \
            --radius ${{ matrix.site.areas_radius_miles }} \
            --postcode "${{ matrix.site.postcode }}" \
            --output template/service_areas.json

      - name: Customize site
        run: |
          python ${{ github.workspace }}/scripts/customise_site.py \
            --domain "${{ matrix.site.domain }}" \
            --city "${{ matrix.site.city }}" \
            --business-name "${{ matrix.site.business_name }}" \
            --phone "${{ matrix.site.phone }}" \
            --address-line1 "${{ matrix.site.address_line1 }}" \
            --address-line2 "${{ matrix.site.address_line2 }}" \
            --postcode "${{ matrix.site.postcode }}" \
            --service-areas template/service_areas.json \
            --service-type "${{ matrix.site.service_type }}" \
            --template-dir template

      - name: Setup Cloudflare Pages
        continue-on-error: true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ] || [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "WARNING: Cloudflare secrets not configured, skipping Pages setup" >&2
            exit 0
          fi
          bash ${{ github.workspace }}/scripts/setup_cloudflare_pages.sh \
            "${{ matrix.site.cf_project }}" \
            "${{ matrix.site.domain }}"

      - name: Setup D1 Database
        continue-on-error: true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ] || [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "WARNING: Cloudflare secrets not configured, skipping D1 setup" >&2
            exit 0
          fi
          python ${{ github.workspace }}/scripts/setup_d1.py \
            --project "${{ matrix.site.cf_project }}" \
            --template-dir template

      - name: Commit and push to new repo
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd template
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -A
          git commit -m "chore: customize site for ${{ matrix.site.domain }}" || true

          # Try to create repo with workflow token - may fail if no permission
          gh repo create WebFoundryAI/${{ matrix.site.repo_name }} --public --source=. --remote=origin --push || {
            echo "WARNING: Could not create repo with current token. Using custom PAT token if available..."
            if [ ! -z "${{ secrets.GH_PAT_TOKEN }}" ]; then
              gh auth login --with-token <<< "${{ secrets.GH_PAT_TOKEN }}"
              gh repo create WebFoundryAI/${{ matrix.site.repo_name }} --public --source=. --remote=origin --push
            else
              echo "ERROR: GH_PAT_TOKEN secret not configured. Please create the repo manually or add a PAT token as GH_PAT_TOKEN secret."
              exit 1
            fi
          }

      - name: Set GitHub secrets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          bash ${{ github.workspace }}/scripts/set_github_secrets.sh \
            "${{ matrix.site.repo_name }}" \
            "${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}"
